name: Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        default: 'staging'
        type: choice
        options: ['staging', 'production']
      components:
        description: 'What to deploy'
        required: true
        default: 'all'
        type: choice
        options: ['worker', 'site', 'app', 'all']
      git_ref:
        description: 'Git ref (branch/sha) to deploy — defaults to master'
        required: false
        default: 'master'

jobs:
  prepare:
    name: Resolve deploy ref
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      sha: ${{ steps.ref.outputs.sha }}
      worker_tag: ${{ steps.worker.outputs.tag }}
      worker_available: ${{ steps.worker.outputs.available }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.git_ref || 'master' }}

      - name: Resolve SHA
        id: ref
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event.inputs.components == 'worker' || github.event.inputs.components == 'all'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve worker image tag
        id: worker
        if: github.event.inputs.components == 'worker' || github.event.inputs.components == 'all'
        run: |
          SHA=$(git rev-parse HEAD)
          if docker manifest inspect "ghcr.io/oslicek/sazinka-worker:${SHA}" > /dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "tag=${SHA}" >> "$GITHUB_OUTPUT"
            echo "Worker image found for exact SHA: ${SHA}"
          elif docker manifest inspect "ghcr.io/oslicek/sazinka-worker:latest" > /dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "::notice::No worker image for ${SHA} — falling back to latest"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "::warning::No worker image found in GHCR. Worker deploy will be skipped."
          fi

  migrate-db:
    name: Run DB migrations (${{ github.event.inputs.target }})
    needs: prepare
    if: |
      (github.event.inputs.components == 'worker' || github.event.inputs.components == 'all')
      && needs.prepare.outputs.worker_available == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Pin VPS SSH host key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Run migrations (production)
        if: github.event.inputs.target == 'production'
        run: |
          ssh -o StrictHostKeyChecking=yes sazinka@${{ secrets.VPS_TAILSCALE_IP }} << 'SCRIPT'
            set -e
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u oslicek --password-stdin
            docker pull ghcr.io/oslicek/sazinka-worker:${{ needs.prepare.outputs.worker_tag }}
            docker run --rm --network infra_sazinka_net \
              -e DATABASE_URL="${{ secrets.MIGRATION_DB_URL }}" \
              ghcr.io/oslicek/sazinka-worker:${{ needs.prepare.outputs.worker_tag }} sazinka-worker migrate
            echo "Migrations completed successfully (production)"
          SCRIPT

      - name: Run migrations (staging)
        if: github.event.inputs.target == 'staging'
        run: |
          ssh -o StrictHostKeyChecking=yes sazinka@${{ secrets.VPS_TAILSCALE_IP }} << 'SCRIPT'
            set -e
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u oslicek --password-stdin
            docker pull ghcr.io/oslicek/sazinka-worker:${{ needs.prepare.outputs.worker_tag }}
            docker run --rm --network infra_sazinka_net \
              -e DATABASE_URL="${{ secrets.MIGRATION_DB_URL_STAGING }}" \
              ghcr.io/oslicek/sazinka-worker:${{ needs.prepare.outputs.worker_tag }} sazinka-worker migrate
            echo "Migrations completed successfully (staging)"
          SCRIPT

  deploy-worker:
    name: Deploy worker (${{ github.event.inputs.target }})
    needs: [prepare, migrate-db]
    if: |
      (github.event.inputs.components == 'worker' || github.event.inputs.components == 'all')
      && needs.prepare.outputs.worker_available == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Pin VPS SSH host key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy worker via Tailscale SSH
        run: |
          TARGET="${{ github.event.inputs.target }}"
          TAG="${{ needs.prepare.outputs.worker_tag }}"
          if [ "$TARGET" = "production" ]; then
            ENV_FILE=".env.prod"
            COMPOSE_FILE="infra/docker-compose.prod.yml"
            PROJECT="infra"
            CONTAINER="sazinka-worker"
          else
            ENV_FILE=".env.staging"
            COMPOSE_FILE="infra/docker-compose.staging.yml"
            PROJECT="ariadline-staging"
            CONTAINER="ariadline-staging-worker"
          fi
          ssh -o StrictHostKeyChecking=yes sazinka@${{ secrets.VPS_TAILSCALE_IP }} << SCRIPT
            set -e
            cd ~/sazinka
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u oslicek --password-stdin
            sed -i "s/^WORKER_VERSION=.*/WORKER_VERSION=${TAG}/" ${ENV_FILE}
            docker compose -p ${PROJECT} --env-file ${ENV_FILE} -f ${COMPOSE_FILE} pull worker
            docker compose -p ${PROJECT} --env-file ${ENV_FILE} -f ${COMPOSE_FILE} up -d worker
            sleep 10
            STATUS=\$(docker inspect ${CONTAINER} --format='{{.State.Status}}' 2>/dev/null || echo 'not found')
            if [ "\$STATUS" != 'running' ]; then
              docker logs ${CONTAINER} --tail 50
              exit 1
            fi
            echo "Worker deployed: ${TAG} (${TARGET})"
          SCRIPT

  deploy-site:
    name: Deploy site (${{ github.event.inputs.target }})
    needs: prepare
    if: github.event.inputs.components == 'site' || github.event.inputs.components == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm --filter @ariadline/site build

      - name: Deploy to Cloudflare Pages
        run: >-
          npx wrangler pages deploy apps/site/dist
          --project-name=ariadline-site
          --branch=${{ github.event.inputs.target == 'production' && 'master' || 'staging' }}
          --commit-hash=${{ needs.prepare.outputs.sha }}
          --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-app:
    name: Deploy app (${{ github.event.inputs.target }})
    needs: prepare
    if: github.event.inputs.components == 'app' || github.event.inputs.components == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Build app
        run: cd apps/web && npx vite build
        env:
          VITE_NATS_WS_URL: ${{ github.event.inputs.target == 'production' && 'wss://api.ariadline.com/nats' || 'wss://api-staging.ariadline.com/nats' }}
          VITE_NATS_USER: browser
          VITE_NATS_PASS: ${{ secrets.NATS_BROWSER_PASSWORD }}
          VITE_BUILD_SHA: ${{ needs.prepare.outputs.sha }}

      - name: Deploy to Cloudflare Pages
        run: >-
          npx wrangler pages deploy apps/web/dist
          --project-name=ariadline-app
          --branch=${{ github.event.inputs.target == 'production' && 'master' || 'staging' }}
          --commit-hash=${{ needs.prepare.outputs.sha }}
          --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  smoke-test:
    name: Smoke test (${{ github.event.inputs.target }})
    needs: [deploy-worker, deploy-site, deploy-app]
    if: always() && (needs.deploy-worker.result == 'success' || needs.deploy-site.result == 'success' || needs.deploy-app.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Set URLs
        id: urls
        run: |
          if [ "${{ github.event.inputs.target }}" = "production" ]; then
            echo "api_url=https://api.ariadline.com/nats" >> "$GITHUB_OUTPUT"
            echo "site_url=https://ariadline.com" >> "$GITHUB_OUTPUT"
            echo "app_url=https://app.ariadline.com" >> "$GITHUB_OUTPUT"
          else
            echo "api_url=https://api-staging.ariadline.com/nats" >> "$GITHUB_OUTPUT"
            echo "site_url=https://staging.ariadline.com" >> "$GITHUB_OUTPUT"
            echo "app_url=https://app-staging.ariadline.com" >> "$GITHUB_OUTPUT"
          fi

      - name: API health
        if: needs.deploy-worker.result == 'success'
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.urls.outputs.api_url }}" || echo "000")
          echo "API status: $STATUS"
          if [ "$STATUS" = "000" ]; then
            echo "::error::API unreachable!"
            exit 1
          fi
          echo "API reachable: HTTP $STATUS"

      - name: Site health
        if: needs.deploy-site.result == 'success'
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.urls.outputs.site_url }}")
          echo "Site status: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "302" ]; then
            echo "::error::Site returned $STATUS!"
            exit 1
          fi

      - name: App health
        if: needs.deploy-app.result == 'success'
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.urls.outputs.app_url }}")
          echo "App status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::App returned $STATUS!"
            exit 1
          fi
