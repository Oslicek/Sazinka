name: CI

on:
  push:
    branches: [master]
    paths:
      - 'worker/**'
      - 'packages/**'
      - 'apps/web/**'
      - 'infra/**'

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      worker: ${{ steps.filter.outputs.worker }}
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            worker:
              - 'worker/**'
              - 'packages/**'
            app:
              - 'apps/web/**'

  test-worker:
    name: Test worker
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sazinka
          POSTGRES_PASSWORD: test
          POSTGRES_DB: sazinka
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U sazinka"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: worker

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres

      - name: Run migrations
        run: cargo sqlx migrate run --source migrations
        working-directory: worker
        env:
          DATABASE_URL: postgres://sazinka:test@localhost:5432/sazinka

      - name: Clippy
        run: >
          cargo clippy --all-targets --
          -D warnings
          -A clippy::too_many_arguments
          -A clippy::type_complexity
          -A clippy::manual_is_multiple_of
          -A clippy::manual_strip
          -A clippy::manual_flatten
          -A clippy::manual_unwrap_or_default
          -A clippy::unnecessary_map_or
          -A clippy::redundant_pattern_matching
          -A clippy::unnecessary_unwrap
          -A clippy::identity_op
          -A clippy::items_after_test_module
          -A clippy::manual_div_ceil
          -A clippy::unnecessary_literal_unwrap
          -A clippy::if_same_then_else
          -A clippy::manual_clamp
          -A clippy::unnecessary_cast
          -A clippy::extend_with_drain
          -A clippy::derivable_impls
          -A clippy::cast_abs_to_unsigned
          -A dead_code
        working-directory: worker
        env:
          DATABASE_URL: postgres://sazinka:test@localhost:5432/sazinka

      - name: Tests
        run: cargo test
        working-directory: worker
        env:
          DATABASE_URL: postgres://sazinka:test@localhost:5432/sazinka
          JWT_SECRET: test-secret-at-least-32-bytes-long!!!

  security-audit:
    name: Security audit
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        if: needs.changes.outputs.worker == 'true'
        run: cargo install cargo-audit

      - name: Cargo audit
        if: needs.changes.outputs.worker == 'true'
        run: cargo audit
        working-directory: worker

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: pnpm audit (warn on non-critical)
        run: pnpm audit --prod
        continue-on-error: true

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-worker:
    name: Build worker image
    needs: [test-worker, security-audit]
    if: needs.changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: worker/Dockerfile
          push: true
          tags: |
            ghcr.io/oslicek/sazinka-worker:${{ github.sha }}
            ghcr.io/oslicek/sazinka-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/oslicek/sazinka-worker:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          trivyignores: '.trivyignore'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Trivy critical gate
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/oslicek/sazinka-worker:${{ github.sha }}
          format: 'table'
          severity: 'CRITICAL'
          exit-code: '1'
          trivyignores: '.trivyignore'
